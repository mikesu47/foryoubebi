<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Sure ka na ba talaga, Bebi?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="sure.css" />
  </head>
  <body>
    <div class="bg-particles" id="bgParticles"></div>
    <canvas id="sparkleCanvas"></canvas>

    <div class="card-container">
      <div class="sticker sticker-1">🤨</div>
      <div class="sticker sticker-2">👀</div>
      <div class="sticker sticker-3">🤎</div>
      <div class="sticker sticker-4">✨</div>

      <div class="polaroid-wrapper">
        <div class="polaroid">
          <div class="polaroid-inner">
            <img
              src="assets/6.jpg"
              alt="Sure ka ba?"
              class="profile-img"
              id="memeImg"
            />
          </div>
        </div>
        <div class="tape tape-left"></div>
        <div class="tape tape-right"></div>
      </div>

      <div class="button-wrapper">
        <a href="#" class="click-me-btn" id="sureBtn">
          <span class="btn-text" id="btnText">SURE KA NA</span>
          <span class="btn-sub" id="btnSub">BA??</span>
          <div class="btn-shimmer"></div>
        </a>
      </div>
    </div>

    <script src="sure.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Para sa Bebi Ko 🤎</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <!-- Floating particles bg -->
    <div class="bg-particles" id="bgParticles"></div>

    <!-- Sparkle overlay -->
    <canvas id="sparkleCanvas"></canvas>

    <div class="card-container">
      <!-- Floating sticker hearts around card -->
      <div class="sticker sticker-1">🤎</div>
      <div class="sticker sticker-2">✨</div>
      <div class="sticker sticker-3">💫</div>
      <div class="sticker sticker-4">🤎</div>

      <!-- Polaroid-style photo -->
      <div class="polaroid-wrapper">
        <div class="polaroid">
          <div class="polaroid-inner">
            <img src="assets/1.jpg" alt="bebi ko" class="profile-img" />
          </div>
          <div class="polaroid-caption">my fav person 🤎</div>
        </div>
        <!-- Washi tape deco -->
        <div class="tape tape-left"></div>
        <div class="tape tape-right"></div>
      </div>

      <!-- CTA Button -->
      <div class="button-wrapper">
        <a href="sure.html" class="click-me-btn" id="loveBtn">
          <span class="btn-text">CLICK ME</span>
          <span class="btn-sub">BEBI</span>
          <div class="btn-shimmer"></div>
        </a>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>

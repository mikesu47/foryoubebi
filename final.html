<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Para sa Pinakamamahal Kong Bebi! 🤎</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="final.css" />
  </head>
  <body>
    <div class="bg-particles" id="bgParticles"></div>
    <canvas id="sparkleCanvas"></canvas>

    <!-- Confetti layer -->
    <div id="confettiLayer"></div>

    <div class="card-container">
      <!-- Stickers -->
      <div class="sticker sticker-1">💗</div>
      <div class="sticker sticker-2">🎀</div>
      <div class="sticker sticker-3">🤎</div>
      <div class="sticker sticker-4">💮</div>

      <!-- Bouquet — main subject -->
      <div class="bouquet-wrapper">
        <img
          src="assets/boquet.png"
          alt="Coffee Bouquet"
          class="bouquet-img"
          id="bouquetImg"
        />

        <!-- Glow ring behind bouquet -->
        <div class="bouquet-glow"></div>
      </div>

      <!-- Message -->
      <div class="final-text">
        <span class="line1">FOR YOU</span>
        <span class="line2">TalynG24 💗</span>
      </div>

      <!-- Sub message -->
      <p class="sub-text">virtual muna for now BWAHAHAHA</p>
    </div>

    <script src="final.js"></script>
  </body>
</html>
